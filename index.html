<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Mi Trading Simulator</title>

<style>
body {
    margin: 0;
    background: #0b1220;
    color: white;
    font-family: Arial, sans-serif;
}

header {
    padding: 15px;
    background: #111827;
    text-align: center;
    font-size: 24px;
}

#chart {
    height: 400px;
    margin: 20px;
    background: #1f2937;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
}

.panel {
    padding: 20px;
    text-align: center;
}

button {
    padding: 12px 30px;
    margin: 10px;
    border: none;
    border-radius: 5px;
    font-size: 18px;
    cursor: pointer;
}

.buy {
    background: green;
    color: white;
}

.sell {
    background: red;
    color: white;
}

.info {
    font-size: 20px;
}
</style>

</head>

<body>

<header>
📈 Mi Plataforma de Trading Demo
</header>


<div id="chart">
    Gráfico de práctica
</div>


<div class="panel">

<button class="buy" onclick="buy()">COMPRAR</button>

<button class="sell" onclick="sell()">VENDER</button>

<p class="info" id="price">
Precio: 100.00
</p>

<p class="info" id="balance">
Balance: $1000
</p>

<p id="result"></p>

</div>


<script>

let balance = 1000;
let price = 100;


function updatePrice(){

    let change = (Math.random() - 0.5) * 2;

    price += change;

    document.getElementById("price").innerHTML =
    "Precio: " + price.toFixed(2);
}


setInterval(updatePrice,1000);



function buy(){

    let entry = price;

    setTimeout(()=>{

        if(price > entry){

            balance += 10;
            result("Ganaste +$10");

        }else{

            balance -= 10;
            result("Perdiste -$10");

        }

        updateBalance();

    },5000);

}



function sell(){

    let entry = price;

    setTimeout(()=>{

        if(price < entry){

            balance += 10;
            result("Ganaste +$10");

        }else{

            balance -= 10;
            result("Perdiste -$10");

        }

        updateBalance();

    },5000);

}



function updateBalance(){

document.getElementById("balance").innerHTML =
"Balance: $" + balance;

}



function result(text){

document.getElementById("result").innerHTML = text;

}


</script>

</body>
</html>
