<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Pro Trading Platform</title>

<style>
body{
    margin:0;
    background:#0d1117;
    color:white;
    font-family:Arial;
}

#chart{
    width:100%;
    height:500px;
    background:#111;
}

#panel{
    padding:10px;
    background:#161b22;
}

button{
    padding:10px;
    margin:5px;
    border:none;
    cursor:pointer;
    font-weight:bold;
}

.buy{background:green;color:white;}
.sell{background:red;color:white;}
</style>

</head>
<body>

<h2 style="padding:10px;">🔥 Pro Trading Platform</h2>

<div id="chart"></div>

<div id="panel">
    <button class="buy" onclick="openTrade('buy')">BUY</button>
    <button class="sell" onclick="openTrade('sell')">SELL</button>
    <p id="price">Precio...</p>
</div>

<script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>

<script>
// ========================
// CONFIG
// ========================
let price = 1.1000;
let spread = 0.0002;
let trend = 0.0001;
let time = Math.floor(Date.now()/1000);

// ========================
// CHART
// ========================
const chart = LightweightCharts.createChart(document.getElementById('chart'),{
    width:window.innerWidth,
    height:500,
    layout:{background:{color:'#111'}, textColor:'#DDD'},
    grid:{vertLines:{color:'#222'}, horzLines:{color:'#222'}}
});

const candles = chart.addCandlestickSeries();

// ========================
// DATOS
// ========================
let data = [];
for(let i=0;i<50;i++){
    let open = price;
    let close = open + (Math.random()-0.5)*0.002;
    let high = Math.max(open,close)+Math.random()*0.001;
    let low = Math.min(open,close)-Math.random()*0.001;

    data.push({time:time, open, high, low, close});
    price = close;
    time += 60;
}
candles.setData(data);

// ========================
// TRADES
// ========================
let trades = [];

function openTrade(type){
    let trade = {
        type:type,
        entry:price,
        line:candles.createPriceLine({
            price:price,
            color:type==="buy"?"green":"red",
            lineWidth:2
        })
    };
    trades.push(trade);
}

// ========================
// ACTUALIZAR TRADES
// ========================
function updateTrades(){
    trades.forEach(t=>{
        let pnl = t.type==="buy" ? price - t.entry : t.entry - price;
        t.line.applyOptions({
            title: "PNL: " + pnl.toFixed(5)
        });
    });
}

// ========================
// MOTOR DE MERCADO PRO
// ========================
setInterval(()=>{

    // CAMBIO DE TENDENCIA
    if(Math.random()<0.05){
        trend = (Math.random()-0.5)*0.001;
    }

    // MOVIMIENTO BASE
    let move = trend;

    // RETROCESOS
    move += (Math.random()-0.5)*0.0005;

    // IMPULSOS (NOTICIAS)
    if(Math.random()<0.03){
        move += (Math.random()-0.5)*0.003;
    }

    let open = price;
    let close = open + move;

    let high = Math.max(open,close) + Math.random()*0.0007;
    let low = Math.min(open,close) - Math.random()*0.0007;

    candles.update({
        time:time,
        open:open,
        high:high,
        low:low,
        close:close
    });

    price = close;
    time += 60;

    let bid = price;
    let ask = price + spread;

    document.getElementById("price").innerHTML =
        "BID: " + bid.toFixed(5) +
        " | ASK: " + ask.toFixed(5);

    updateTrades();

},2000);

</script>

</body>
</html>
