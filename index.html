<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<title>Trading Simulator Pro</title>

<script src="https://unpkg.com/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>

<style>

body{
margin:0;
background:#0f172a;
color:white;
font-family:Arial;
}

header{
background:#111827;
padding:15px;
text-align:center;
font-size:25px;
}

#chart{
height:500px;
margin:20px;
}

.panel{
text-align:center;
}

button{
padding:12px 30px;
margin:10px;
font-size:18px;
cursor:pointer;
border-radius:5px;
border:none;
}

.buy{
background:#16a34a;
color:white;
}

.sell{
background:#dc2626;
color:white;
}

.info{
font-size:20px;
}

</style>

</head>


<body>

<header>
📈 Trading Simulator Pro
</header>


<div id="chart"></div>


<div class="panel">

<button class="buy" onclick="buy()">COMPRAR</button>

<button class="sell" onclick="sell()">VENDER</button>


<p class="info" id="timer">
Tiempo: -- 
</p>


<p class="info" id="balance">
Balance: $1000
</p>


<p id="result"></p>

</div>



<script>


const chart = LightweightCharts.createChart(
document.getElementById("chart"),
{
height:500,

layout:{
background:{color:"#0f172a"},
textColor:"white"
}

});


const candleSeries = chart.addCandlestickSeries();


let price=100;

let time=Math.floor(Date.now()/1000)-3600;

let candles=[];


for(let i=0;i<50;i++){

let open=price;

let close=open+(Math.random()-0.5)*5;


candles.push({

time:time,
open:open,
high:Math.max(open,close)+2,
low:Math.min(open,close)-2,
close:close

});


price=close;
time+=60;

}


candleSeries.setData(candles);



setInterval(()=>{


let open=price;

let close=open+(Math.random()-0.5)*5;


let candle={

time:time,
open:open,
high:Math.max(open,close)+2,
low:Math.min(open,close)-2,
close:close

};


candleSeries.update(candle);


price=close;

time+=60;


},2000);



// TRADING


let balance=1000;

let entry=0;

let position="";



function buy(){

startTrade("BUY");

}


function sell(){

startTrade("SELL");

}



function startTrade(type){

entry=price;

position=type;


let marker={

time:time,
position:"belowBar",
color:"blue",
shape:"arrowUp",
text:type+" Entrada"

};


candleSeries.setMarkers([marker]);


let seconds=60;


let timer=setInterval(()=>{


document.getElementById("timer").innerHTML=
"Tiempo: "+seconds+" segundos";


seconds--;


if(seconds<0){

clearInterval(timer);

finishTrade();

}


},1000);


}



function finishTrade(){


let win=false;


if(position=="BUY" && price>entry){

win=true;

}


if(position=="SELL" && price<entry){

win=true;

}



if(win){

balance+=10;

document.getElementById("result").innerHTML=
"✅ Ganaste +$10";


}else{


balance-=10;

document.getElementById("result").innerHTML=
"❌ Perdiste -$10";


}



document.getElementById("balance").innerHTML=
"Balance: $"+balance;


document.getElementById("timer").innerHTML=
"Operación terminada";


}


</script>


</body>

</html>
