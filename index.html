<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mi Trading Platform</title>

<script src="https://unpkg.com/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>

<style>

body {
    margin:0;
    background:#0f172a;
    color:white;
    font-family:Arial, sans-serif;
}

header {
    background:#111827;
    padding:15px;
    text-align:center;
    font-size:25px;
}

#chart {
    height:500px;
    margin:20px;
}

.panel {
    text-align:center;
    padding:10px;
}

button {
    padding:12px 35px;
    margin:10px;
    border:none;
    border-radius:5px;
    font-size:18px;
    cursor:pointer;
}

.buy {
    background:#16a34a;
    color:white;
}

.sell {
    background:#dc2626;
    color:white;
}

.info {
    font-size:20px;
}

</style>

</head>


<body>


<header>
📈 Mi Trading Platform Demo
</header>


<div id="chart"></div>


<div class="panel">

<button class="buy" onclick="buy()">COMPRAR</button>

<button class="sell" onclick="sell()">VENDER</button>


<p class="info" id="price">
Precio: 100.00
</p>


<p class="info" id="balance">
Balance: $1000
</p>


<p id="message"></p>


</div>



<script>


// Crear gráfico profesional

const chart = LightweightCharts.createChart(
document.getElementById("chart"),
{
    width: window.innerWidth - 40,
    height:500,

    layout:{
        background:{
            color:"#0f172a"
        },
        textColor:"#ffffff"
    },

    grid:{
        vertLines:{
            color:"#1e293b"
        },
        horzLines:{
            color:"#1e293b"
        }
    }
});


// Crear velas

const candles = chart.addCandlestickSeries({
    upColor:"#22c55e",
    downColor:"#ef4444",
    borderVisible:false,
    wickUpColor:"#22c55e",
    wickDownColor:"#ef4444"
});


// Datos iniciales

let data=[];

let currentPrice=100;

let currentTime=Math.floor(Date.now()/1000)-3600;


for(let i=0;i<60;i++){

    let open=currentPrice;

    let close=open+(Math.random()-0.5)*5;

    let high=Math.max(open,close)+2;

    let low=Math.min(open,close)-2;


    data.push({

        time:currentTime,
        open:open,
        high:high,
        low:low,
        close:close

    });


    currentPrice=close;

    currentTime+=60;

}


candles.setData(data);



// Movimiento de mercado

setInterval(()=>{


let open=currentPrice;

let close=open+(Math.random()-0.5)*5;


let candle={

time:currentTime,

open:open,

high:Math.max(open,close)+2,

low:Math.min(open,close)-2,

close:close

};


candles.update(candle);


currentPrice=close;

currentTime+=60;


document.getElementById("price").innerHTML=
"Precio: "+currentPrice.toFixed(2);


},2000);



// Sistema demo

let balance=1000;


function buy(){

balance+=10;

document.getElementById("balance").innerHTML=
"Balance: $"+balance;


document.getElementById("message").innerHTML=
"Compra ejecutada";


}



function sell(){

balance-=10;

document.getElementById("balance").innerHTML=
"Balance: $"+balance;


document.getElementById("message").innerHTML=
"Venta ejecutada";


}



// Ajustar tamaño

window.addEventListener("resize",()=>{

chart.applyOptions({

width:window.innerWidth-40

});

});


</script>


</body>

</html>
