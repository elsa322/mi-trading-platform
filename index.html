<script>
let balance = 1000;
let price = 1.1000;
let trend = 0;
let time = Math.floor(Date.now() / 1000);
let spread = 0.0002;

let lastHigh = price;
let lastLow = price;
let liquidityZones = [];

// Simulación de trades activos
let trades = [];

function updateTrades(){
  trades.forEach(t => {
    let current = price;
    let profit = 0;

    if(t.type === "buy"){
      profit = current - t.entry;
    } else {
      profit = t.entry - current;
    }

    t.profit = profit;
  });
}

// SIMULACIÓN DE MERCADO PRO
setInterval(() => {

  // CAMBIO DE TENDENCIA
  if(Math.random() < 0.05){
    trend = (Math.random() - 0.5) * 0.001;
  }

  // MOVIMIENTO BASE
  let move = trend;

  // RUIDO
  move += (Math.random() - 0.5) * 0.0005;

  // IMPULSO FUERTE
  if(Math.random() < 0.03){
    move += (Math.random() - 0.5) * 0.003;
  }

  let open = price;
  let close = open + move;
  let high = Math.max(open, close) + Math.random() * 0.0005;
  let low = Math.min(open, close) - Math.random() * 0.0005;

  price = close;
  time += 60;

  // BID / ASK
  let bid = price;
  let ask = price + spread;

  // Mostrar precio
  document.getElementById("price").innerHTML =
    "BID: " + bid.toFixed(5) + " | ASK: " + ask.toFixed(5);

  // Actualizar trades
  updateTrades();

  // DETECTAR LIQUIDEZ
  if(close > lastHigh){
    liquidityZones.push({price: lastHigh, type: "high"});
    lastHigh = close;
  }

  if(close < lastLow){
    liquidityZones.push({price: lastLow, type: "low"});
    lastLow = close;
  }

}, 2000);


// FUNCION TRADE
function trade(type){
  let entry = price;

  trades.push({
    type: type,
    entry: entry,
    profit: 0
  });

  setTimeout(() => {
    let exit = price;
    let win = false;

    if(type === "buy" && exit > entry) win = true;
    if(type === "sell" && exit < entry) win = true;

    // SIMULACION MANIPULACION
    if(Math.random() < 0.3){
      win = false;
    }

    if(win){
      balance += 50;
      alert("✅ Ganaste");
    } else {
      balance -= 50;
      alert("❌ Perdiste");
    }

    document.getElementById("balance").innerText = balance;

  }, 5000);
}
</script>
