<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<title>Forex Trading Pro</title>

<script src="https://unpkg.com/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>

<style>

body{
margin:0;
background:#0b1220;
color:white;
font-family:Arial;
display:flex;
}

/* PANEL IZQUIERDO (GRÁFICO) */

#chart{
width:75%;
height:100vh;
}

/* PANEL DERECHO */

.panel{
width:25%;
background:#111827;
padding:20px;
box-sizing:border-box;
}

h2{
margin-top:0;
}

button{
width:100%;
padding:12px;
margin-top:10px;
font-size:16px;
border:none;
border-radius:5px;
cursor:pointer;
}

.buy{
background:#16a34a;
color:white;
}

.sell{
background:#dc2626;
color:white;
}

input{
width:100%;
padding:10px;
margin-top:10px;
border-radius:5px;
border:none;
}

.info{
margin-top:15px;
font-size:18px;
}

.trade{
background:#1f2937;
padding:10px;
margin-top:10px;
border-radius:5px;
}

</style>

</head>


<body>

<div id="chart"></div>

<div class="panel">

<h2>EUR/USD</h2>

<input type="number" id="lot" value="1" step="0.1">

<button class="buy" onclick="buy()">BUY</button>
<button class="sell" onclick="sell()">SELL</button>

<div class="info" id="price">Precio: 1.1000</div>
<div class="info" id="balance">Balance: $10000</div>

<h3>Trades</h3>
<div id="trades"></div>

<h3>Stats</h3>
<div id="stats"></div>

</div>


<script>

// ===== GRÁFICO =====

const chart = LightweightCharts.createChart(document.getElementById("chart"),{
layout:{background:{color:"#0b1220"},textColor:"white"},
grid:{vertLines:{color:"#1e293b"},horzLines:{color:"#1e293b"}},
width:window.innerWidth*0.75,
height:window.innerHeight
});

const candles = chart.addCandlestickSeries();

const maLine = chart.addLineSeries({color:"yellow"});

let data=[];
let price=1.1000;
let time=Math.floor(Date.now()/1000)-3600;

// DATOS INICIALES

for(let i=0;i<100;i++){

let open=price;
let close=open+(Math.random()-0.5)*0.002;

data.push({
time:time,
open:open,
high:Math.max(open,close)+0.001,
low:Math.min(open,close)-0.001,
close:close
});

price=close;
time+=60;

}

candles.setData(data);

// MEDIA MOVIL

function calcMA(){

let ma=[];

for(let i=10;i<data.length;i++){

let sum=0;

for(let j=0;j<10;j++){
sum+=data[i-j].close;
}

ma.push({
time:data[i].time,
value:sum/10
});

}

maLine.setData(ma);

}

calcMA();


// ===== MERCADO EN VIVO =====

setInterval(()=>{

let open=price;
let close=open+(Math.random()-0.5)*0.002;

let candle={
time:time,
open:open,
high:Math.max(open,close)+0.001,
low:Math.min(open,close)-0.001,
close:close
};

candles.update(candle);

data.push(candle);

price=close;
time+=60;

document.getElementById("price").innerHTML=
"Precio: "+price.toFixed(5);

calcMA();

updateFloating();

},2000);


// ===== TRADING =====

let balance=10000;
let trades=[];
let wins=0;
let losses=0;

function buy(){
openTrade("BUY");
}

function sell(){
openTrade("SELL");
}

function openTrade(type){

let lot=parseFloat(document.getElementById("lot").value);

let trade={
type:type,
entry:price,
lot:lot,
open:true
};

trades.push(trade);

renderTrades();

}

function updateFloating(){

trades.forEach(trade=>{

if(!trade.open) return;

let profit=0;

if(trade.type==="BUY"){
profit=(price-trade.entry)*10000*trade.lot;
}else{
profit=(trade.entry-price)*10000*trade.lot;
}

trade.profit=profit;

});

renderTrades();

}

function closeTrade(index){

let trade=trades[index];

trade.open=false;

balance+=trade.profit;

if(trade.profit>0){
wins++;
}else{
losses++;
}

updateUI();

}

function renderTrades(){

let html="";

trades.forEach((t,i)=>{

html+=`
<div class="trade">
${t.type} | Entry: ${t.entry.toFixed(5)}<br>
Profit: ${t.profit ? t.profit.toFixed(2):0}<br>
${t.open ? `<button onclick="closeTrade(${i})">Cerrar</button>`:"Cerrado"}
</div>
`;

});

document.getElementById("trades").innerHTML=html;

updateUI();

}

function updateUI(){

document.getElementById("balance").innerHTML=
"Balance: $"+balance.toFixed(2);

let total=wins+losses;

let winrate= total>0 ? (wins/total*100).toFixed(1):0;

document.getElementById("stats").innerHTML=
"Ganadas: "+wins+"<br>Perdidas: "+losses+"<br>Winrate: "+winrate+"%";

}


// RESPONSIVE

window.addEventListener("resize",()=>{

chart.applyOptions({
width:window.innerWidth*0.75,
height:window.innerHeight
});

});

</script>

</body>

</html>
